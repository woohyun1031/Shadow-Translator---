<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Shadow Translator</title>
        <style>
            :root {
                --pop-bg: #0e0f12;
                --pop-bg-2: #14161b;
                --pop-card: #15171c;
                --pop-card-2: #1a1c22;
                --pop-border: #25272e;
                --pop-border-soft: #1e1f25;
                --pop-text: #ececef;
                --pop-text-dim: #9097a1;
                --pop-text-muted: #5e646e;
                --pop-accent: #ff6b35;
                --pop-accent-soft: rgba(255, 107, 53, 0.14);
                --pop-on: #e8eaed;
            }

            html,
            body {
                margin: 0;
                background: var(--pop-bg);
                color: var(--pop-text);
                font-family:
                    -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
                    sans-serif;
                -webkit-font-smoothing: antialiased;
            }

            body {
                width: 260px;
            }

            .popup {
                position: relative;
                background: var(--pop-bg);
                color: var(--pop-text);
                overflow: hidden;
                box-sizing: border-box;
                /* drawer(~316px)가 슬라이드업해도 잘리지 않도록 고정 높이를 보장.
                   닫혀 있을 때는 .pop-inner의 footer가 margin-top:auto로 바닥에 붙는다. */
                min-height: 360px;
                display: flex;
                flex-direction: column;
            }

            .pop-inner {
                padding: 16px 16px 14px;
                position: relative;
                flex: 1;
                display: flex;
                flex-direction: column;
            }

            /* Header */
            .pop-header {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 14px;
            }
            .pop-logo {
                width: 29px;
                height: 29px;
                flex-shrink: 0;
                display: block;
            }
            .pop-title {
                flex: 1;
                min-width: 0;
                line-height: 1.1;
            }
            .pop-title .name {
                font-weight: 600;
                font-size: 13.5px;
                letter-spacing: -0.01em;
                color: var(--pop-text);
            }
            .pop-title .sub {
                font-size: 10.5px;
                color: var(--pop-text-muted);
                margin-top: 2px;
                letter-spacing: 0.02em;
            }
            .pop-version {
                font-size: 10px;
                font-weight: 500;
                color: var(--pop-text-muted);
                padding: 3px 7px;
                border-radius: 999px;
                border: 1px solid var(--pop-border-soft);
                letter-spacing: 0.03em;
            }

            /* Enable toggle row */
            .toggle-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 14px;
                background: var(--pop-card);
                border: 1px solid var(--pop-border-soft);
                border-radius: 10px;
                margin-bottom: 10px;
            }
            .toggle-row .tr-text {
                display: flex;
                flex-direction: column;
                gap: 2px;
            }
            .toggle-row .tr-label {
                font-size: 12.5px;
                font-weight: 500;
                color: var(--pop-text);
                letter-spacing: 0.01em;
            }
            .toggle-row .tr-sub {
                font-size: 10.5px;
                color: var(--pop-text-muted);
            }

            /* Switch */
            .switch {
                position: relative;
                width: 36px;
                height: 20px;
                flex-shrink: 0;
            }
            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
                position: absolute;
            }
            .switch .track {
                position: absolute;
                inset: 0;
                background: var(--pop-card-2);
                border: 1px solid var(--pop-border);
                border-radius: 999px;
                transition:
                    background 0.2s,
                    border-color 0.2s;
                cursor: pointer;
            }
            .switch .knob {
                position: absolute;
                width: 14px;
                height: 14px;
                background: var(--pop-text-muted);
                border-radius: 50%;
                top: 50%;
                left: 3px;
                transform: translateY(-50%);
                transition:
                    left 0.18s ease,
                    background 0.18s;
                pointer-events: none;
            }
            .switch input:checked + .track {
                background: var(--pop-on);
                border-color: var(--pop-on);
            }
            .switch input:checked + .track + .knob {
                left: 19px;
                background: var(--pop-bg);
            }

            /* Settings trigger */
            .settings-trigger {
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 11px 14px;
                background: transparent;
                border: 1px solid var(--pop-border-soft);
                border-radius: 10px;
                color: var(--pop-text-dim);
                font-family: inherit;
                font-size: 12.5px;
                font-weight: 500;
                letter-spacing: 0.01em;
                cursor: pointer;
                transition:
                    background 0.15s,
                    color 0.15s,
                    border-color 0.15s;
                margin-bottom: 12px;
            }
            .settings-trigger:hover {
                background: var(--pop-card);
                color: var(--pop-text);
                border-color: var(--pop-border);
            }
            .settings-trigger .st-left {
                display: flex;
                align-items: center;
                gap: 9px;
            }
            .settings-trigger .st-chev {
                color: var(--pop-text-muted);
            }

            /* Hint message (Enable 변경 후 안내) */
            .hint-message {
                margin-bottom: 12px;
                font-size: 11.5px;
                color: var(--pop-text-dim);
                background-color: var(--pop-card);
                padding: 10px 12px;
                border-radius: 8px;
                border: 1px solid var(--pop-border-soft);
                line-height: 1.4;
                letter-spacing: 0.2px;
                display: none;
            }

            /* Footer */
            .footer {
                border-top: 1px solid var(--pop-border-soft);
                padding-top: 11px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                /* 기본 높이가 drawer에 맞춰 고정돼 있어 빈 공간이 위로 모이도록 한다 */
                margin-top: auto;
            }
            .footer .links {
                display: flex;
                gap: 12px;
            }
            .footer .links a {
                color: var(--pop-text-dim);
                text-decoration: none;
                font-size: 11px;
                display: inline-flex;
                align-items: center;
                gap: 5px;
                transition: color 0.15s;
            }
            .footer .links a:hover {
                color: var(--pop-text);
            }
            .footer .links svg {
                width: 12px;
                height: 12px;
                opacity: 0.8;
            }
            .footer .privacy {
                font-size: 9.5px;
                color: var(--pop-text-muted);
                letter-spacing: 0.04em;
                text-transform: uppercase;
                display: inline-flex;
                align-items: center;
                gap: 4px;
            }
            .footer .privacy::before {
                content: '';
                width: 4px;
                height: 4px;
                border-radius: 50%;
                background: var(--pop-text-muted);
                opacity: 0.6;
            }

            /* Drawer */
            .drawer-scrim {
                position: absolute;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.22s;
                z-index: 5;
            }
            .drawer-scrim.open {
                opacity: 1;
                pointer-events: auto;
            }
            .drawer {
                position: absolute;
                left: 0;
                right: 0;
                bottom: 0;
                background: var(--pop-bg-2);
                border-top: 1px solid var(--pop-border);
                border-radius: 16px 16px 0 0;
                transform: translateY(100%);
                transition: transform 0.32s cubic-bezier(0.2, 0.8, 0.25, 1);
                z-index: 10;
                padding: 8px 16px 14px;
                box-sizing: border-box;
                box-shadow:
                    0 -10px 24px -6px rgba(0, 0, 0, 0.45),
                    0 -1px 0 rgba(255, 255, 255, 0.03) inset;
            }
            .drawer.open {
                transform: translateY(0);
            }
            .drawer .handle {
                width: 32px;
                height: 3px;
                background: var(--pop-border);
                border-radius: 999px;
                margin: 4px auto 10px;
            }
            .drawer .d-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 12px;
            }
            .drawer .d-title {
                font-size: 12px;
                font-weight: 600;
                color: var(--pop-text);
                letter-spacing: 0.01em;
            }
            .drawer .d-close {
                background: transparent;
                border: none;
                color: var(--pop-text-muted);
                cursor: pointer;
                font-size: 11px;
                font-family: inherit;
                padding: 4px 6px;
                margin: -4px -6px;
                border-radius: 6px;
            }
            .drawer .d-close:hover {
                color: var(--pop-text);
            }

            .field {
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-bottom: 12px;
            }
            .field .f-head {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .field .f-label {
                font-size: 11px;
                color: var(--pop-text-dim);
                font-weight: 500;
                letter-spacing: 0.02em;
            }
            .field .f-out {
                font-size: 10.5px;
                color: var(--pop-text-muted);
                font-variant-numeric: tabular-nums;
            }

            /* Swatches */
            .swatches {
                display: flex;
                gap: 6px;
                align-items: center;
            }
            .swatch {
                width: 22px;
                height: 22px;
                border-radius: 50%;
                cursor: pointer;
                border: 1px solid var(--pop-border-soft);
                position: relative;
                transition: transform 0.15s;
                padding: 0;
                background-clip: padding-box;
            }
            .swatch:hover {
                transform: scale(1.08);
            }
            .swatch.active::after {
                content: '';
                position: absolute;
                inset: -3px;
                border: 1px solid var(--pop-text);
                border-radius: 50%;
            }
            .swatch.custom {
                background: conic-gradient(
                    from 0deg,
                    #ff5b5b,
                    #ffd14f,
                    #6fd97a,
                    #5ab9ff,
                    #b974ff,
                    #ff5b5b
                );
                display: grid;
                place-items: center;
                overflow: hidden;
            }
            .swatch.custom input {
                opacity: 0;
                position: absolute;
                inset: 0;
                cursor: pointer;
                border: 0;
                padding: 0;
            }
            .swatch.custom .pencil {
                color: #fff;
                font-size: 10px;
                line-height: 1;
                text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
                pointer-events: none;
            }

            /* Range */
            .range {
                -webkit-appearance: none;
                appearance: none;
                width: 100%;
                height: 16px;
                background: transparent;
                cursor: pointer;
                padding: 0;
                accent-color: var(--pop-accent);
            }
            .range::-webkit-slider-runnable-track {
                height: 3px;
                background: var(--pop-border);
                border-radius: 999px;
            }
            .range::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: var(--pop-text);
                margin-top: -5.5px;
                border: 2px solid var(--pop-bg);
                box-shadow: 0 0 0 1px var(--pop-border);
                cursor: pointer;
            }
            .range::-moz-range-track {
                height: 3px;
                background: var(--pop-border);
                border-radius: 999px;
            }
            .range::-moz-range-thumb {
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: var(--pop-text);
                border: 2px solid var(--pop-bg);
                box-shadow: 0 0 0 1px var(--pop-border);
            }

            /* Action row */
            .actions {
                display: flex;
                gap: 6px;
                margin-top: 14px;
                padding-top: 12px;
                border-top: 1px solid var(--pop-border-soft);
            }
            .actions button {
                flex: 1;
                padding: 8px 0;
                font-size: 11.5px;
                font-weight: 500;
                font-family: inherit;
                border-radius: 8px;
                cursor: pointer;
                transition:
                    background 0.15s,
                    color 0.15s,
                    border-color 0.15s,
                    opacity 0.15s;
                letter-spacing: 0.01em;
            }
            .btn-reset {
                background: transparent;
                color: var(--pop-text-muted);
                border: 1px solid transparent;
                flex: 0.6;
            }
            .btn-reset:hover {
                color: var(--pop-text-dim);
            }
            .btn-cancel {
                background: transparent;
                color: var(--pop-text-dim);
                border: 1px solid var(--pop-border);
            }
            .btn-cancel:hover {
                background: var(--pop-card);
                color: var(--pop-text);
            }
            .btn-save {
                background: var(--pop-text);
                color: var(--pop-bg);
                border: 1px solid var(--pop-text);
            }
            .btn-save:hover {
                opacity: 0.92;
            }
        </style>
    </head>
    <body>
        <div class="popup" id="popup" data-popup-enabled="true">
            <div class="pop-inner">
                <!-- Header -->
                <div class="pop-header">
                    <img src="assets/logo.svg" alt="" class="pop-logo" aria-hidden="true" />
                    <div class="pop-title">
                        <div class="name">Shadow Translator</div>
                        <div class="sub">Original under translation</div>
                    </div>
                    <div class="pop-version">v1.1.0</div>
                </div>

                <!-- Enable toggle -->
                <div class="toggle-row">
                    <div class="tr-text">
                        <div class="tr-label">Enable Shadow</div>
                        <div class="tr-sub" id="enableSub">Active on this page</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="toggleSwitch" />
                        <span class="track"></span>
                        <span class="knob"></span>
                    </label>
                </div>

                <div id="hintMessage" class="hint-message"></div>

                <!-- Open settings drawer -->
                <button class="settings-trigger" id="openSettings" type="button">
                    <span class="st-left">
                        <svg
                            width="13"
                            height="13"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1.08-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                            />
                        </svg>
                        Shadow style
                    </span>
                    <svg
                        class="st-chev"
                        width="12"
                        height="12"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <path d="M9 18l6-6-6-6" />
                    </svg>
                </button>

                <!-- Footer -->
                <div class="footer">
                    <div class="links">
                        <a
                            href="https://github.com/woohyun1031/Shadow-Translator#troubleshooting"
                            target="_blank"
                            rel="noopener noreferrer"
                            id="lnkHelp"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <circle cx="12" cy="12" r="10" />
                                <path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 2-3 4" />
                                <circle cx="12" cy="17" r="0.5" fill="currentColor" />
                            </svg>
                            Help
                        </a>
                        <a
                            href="https://github.com/woohyun1031/Shadow-Translator/issues"
                            target="_blank"
                            rel="noopener noreferrer"
                            id="lnkIssue"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <circle cx="12" cy="12" r="9" />
                                <path d="M12 8v4" />
                                <circle cx="12" cy="16" r="0.5" fill="currentColor" />
                            </svg>
                            Issue
                        </a>
                    </div>
                    <!-- <span class="privacy">Local only</span> -->
                </div>
            </div>

            <!-- Drawer -->
            <div class="drawer-scrim" id="scrim"></div>
            <div class="drawer" id="drawer" role="dialog" aria-label="Shadow style settings">
                <div class="handle"></div>
                <div class="d-header">
                    <div class="d-title">Shadow style</div>
                    <button class="d-close" id="closeDrawer" type="button">Close</button>
                </div>

                <!-- Color -->
                <div class="field">
                    <div class="f-head">
                        <span class="f-label">Color</span>
                        <span class="f-out" id="colorOut">#787878</span>
                    </div>
                    <div class="swatches" id="swatches">
                        <button
                            type="button"
                            class="swatch"
                            data-color="#787878"
                            style="background: #787878"
                        ></button>
                        <button
                            type="button"
                            class="swatch"
                            data-color="#9aa0a8"
                            style="background: #9aa0a8"
                        ></button>
                        <button
                            type="button"
                            class="swatch"
                            data-color="#5e646e"
                            style="background: #5e646e"
                        ></button>
                        <button
                            type="button"
                            class="swatch"
                            data-color="#3a3d44"
                            style="background: #3a3d44"
                        ></button>
                        <button
                            type="button"
                            class="swatch"
                            data-color="#ff6b35"
                            style="background: #ff6b35"
                        ></button>
                        <button
                            type="button"
                            class="swatch"
                            data-color="#6f9bd1"
                            style="background: #6f9bd1"
                        ></button>
                        <label class="swatch custom" title="Pick color">
                            <span class="pencil">✎</span>
                            <input type="color" id="customColor" value="#787878" />
                        </label>
                    </div>
                </div>

                <!-- Font size -->
                <div class="field">
                    <div class="f-head">
                        <span class="f-label">Font size</span>
                        <span class="f-out" id="sizeOut">0.90em</span>
                    </div>
                    <input
                        class="range"
                        type="range"
                        id="sizeRange"
                        min="0.5"
                        max="1.6"
                        step="0.05"
                        value="0.9"
                    />
                </div>

                <!-- Line height -->
                <div class="field">
                    <div class="f-head">
                        <span class="f-label">Line height</span>
                        <span class="f-out" id="lineOut">1.4</span>
                    </div>
                    <input
                        class="range"
                        type="range"
                        id="lineRange"
                        min="1.0"
                        max="2.0"
                        step="0.1"
                        value="1.4"
                    />
                </div>

                <!-- Opacity -->
                <div class="field">
                    <div class="f-head">
                        <span class="f-label">Opacity</span>
                        <span class="f-out" id="opOut">0.80</span>
                    </div>
                    <input
                        class="range"
                        type="range"
                        id="opRange"
                        min="0.2"
                        max="1.0"
                        step="0.05"
                        value="0.8"
                    />
                </div>

                <div class="actions">
                    <button type="button" class="btn-reset" id="btnReset">Reset</button>
                    <button type="button" class="btn-cancel" id="btnCancel">Cancel</button>
                    <button type="button" class="btn-save" id="btnSave">Save</button>
                </div>
            </div>
        </div>

        <script src="popup.js"></script>
    </body>
</html>
